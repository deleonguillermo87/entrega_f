<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gestor de datos</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main>

        <h1>Gestor de datos</h1>

        <form id="data-form">

        <label for="product-name">
            Nombre del producto:
        </label>

        <input 
            type="text"
            id="product-name"
            placeholder="Ej: Laptop Gamer"
            required
        />

        <label for="product-price">
            Precio:
        </label>

        <input 
            type="number"
            id="product-price"
            placeholder="Ej: 2500"
            required
        />

        <label for="product-description">
            Descripción:
        </label>

        <input 
            type="text"
            id="product-description"
            placeholder="Describe el producto"
            required
        />

        <button id ="btn" type="button">
            Agregar producto
        </button>

        </form>

        <button id="sync-btn" type="button">
        Sincronizar con la API
        </button>

        <section>

        <h2>Lista de elementos</h2>

        <div id="lista-api"></div>

        <ul id="items-list"></ul>

        </section>

    </main>

    <script src="app.js"></script>

</body>
</html>
